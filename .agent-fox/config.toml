# agent-fox project configuration
# Uncomment and modify settings as needed.

# [hooks]
# pre_code = ["security-scan.sh"]
# post_code = ["license-check.sh"]
# timeout = 300  # seconds per hook

# [hooks.modes]
# "security-scan.sh" = "abort"   # "abort" (default) or "warn"
# "license-check.sh" = "warn"

# [security]
# Uncomment to replace the built-in allowlist entirely:
# bash_allowlist = ["ls", "cat", "git", "python", "uv"]

# Uncomment to extend the built-in allowlist:
# bash_allowlist_extend = ["cargo", "rustc", "docker"]

[costs.claude-opus-4-6]
input = 5.0    # $ per million input tokens
output = 25.0  # $ per million output tokens

# [theme]
# playful = true                    # Enable kitsune personality (default: true)
# header = "bold #ff8c00"           # Banner and headers
# success = "bold green"            # Completed tasks
# error = "bold red"                # Failed/blocked tasks
# warning = "bold yellow"           # In-progress, caution
# info = "#daa520"                  # Informational text
# tool = "bold #cd853f"             # Tool names in progress
# muted = "dim"                     # Secondary text
