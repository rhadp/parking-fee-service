[package]
name = "mock-sensors"
version = "0.1.0"
edition = "2021"
description = "Mock sensor CLI tools for injecting VSS signal values into DATA_BROKER"

[dependencies]
clap = { version = "4", features = ["derive"] }
databroker-client = { path = "../databroker-client" }
tokio = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bin]]
name = "location-sensor"
path = "src/bin/location-sensor.rs"

[[bin]]
name = "speed-sensor"
path = "src/bin/speed-sensor.rs"

[[bin]]
name = "door-sensor"
path = "src/bin/door-sensor.rs"
