[package]
name = "mock-sensors"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "location-sensor"
path = "src/bin/location-sensor.rs"

[[bin]]
name = "speed-sensor"
path = "src/bin/speed-sensor.rs"

[[bin]]
name = "door-sensor"
path = "src/bin/door-sensor.rs"

[lib]
name = "mock_sensors"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
tonic = "0.11"
prost = "0.12"
clap = { version = "4", features = ["derive", "env"] }

[build-dependencies]
tonic-build = "0.11"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
