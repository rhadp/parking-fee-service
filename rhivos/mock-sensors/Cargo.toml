[package]
name = "mock-sensors"
version = "0.1.0"
edition = "2021"

[dependencies]
prost = "0.12"
tokio = { version = "1", features = ["full"] }
tonic = { version = "0.11", features = ["transport"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }

[build-dependencies]
tonic-build = "0.11"

[[bin]]
name = "location-sensor"
path = "src/bin/location-sensor.rs"

[[bin]]
name = "speed-sensor"
path = "src/bin/speed-sensor.rs"

[[bin]]
name = "door-sensor"
path = "src/bin/door-sensor.rs"
