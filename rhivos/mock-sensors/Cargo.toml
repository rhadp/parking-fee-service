[package]
name = "mock-sensors"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "location-sensor"
path = "src/bin/location_sensor.rs"

[[bin]]
name = "speed-sensor"
path = "src/bin/speed_sensor.rs"

[[bin]]
name = "door-sensor"
path = "src/bin/door_sensor.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
tonic = "0.11"
prost = "0.12"

[build-dependencies]
tonic-build = "0.11"

[dev-dependencies]
