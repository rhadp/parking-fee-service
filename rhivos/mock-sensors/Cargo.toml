[package]
name = "mock-sensors"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "mock-sensors"
path = "src/main.rs"

[[bin]]
name = "location-sensor"
path = "src/bin/location-sensor.rs"

[[bin]]
name = "speed-sensor"
path = "src/bin/speed-sensor.rs"

[[bin]]
name = "door-sensor"
path = "src/bin/door-sensor.rs"

[dependencies]
tonic = { version = "0.12", features = ["transport"] }
prost = "0.13"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
clap = { version = "4", features = ["derive", "env"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }

[build-dependencies]
tonic-build = "0.12"
