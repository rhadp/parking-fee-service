syntax = "proto3";

package kuksa;

option go_package = "github.com/sdv-demo/proto/kuksa";

// Datapoint holds a single VSS signal value at a point in time.
message Datapoint {
  // timestamp is Unix time in milliseconds.
  int64 timestamp = 1;
  oneof value {
    string string_value = 10;
    bool bool_value = 11;
    int32 int32_value = 12;
    int64 int64_value = 13;
    uint32 uint32_value = 14;
    uint64 uint64_value = 15;
    float float_value = 16;
    double double_value = 17;
  }
}

// EntryRequest selects which fields to include in a GetRequest or SubscribeRequest.
message Field {
  string path = 1;
}

// GetRequest retrieves the current value of one or more VSS signals.
message GetRequest {
  repeated Field entries = 1;
}

// GetResponse returns the current values of the requested signals.
message GetResponse {
  repeated DataEntry entries = 1;
  repeated Error errors = 2;
}

// DataEntry pairs a VSS path with its current datapoint.
message DataEntry {
  string path = 1;
  Datapoint value = 2;
}

// SetRequest updates the value of one or more VSS actuator signals.
message SetRequest {
  repeated DataEntry updates = 1;
}

// SetResponse reports errors for each failed update in a SetRequest.
message SetResponse {
  repeated Error errors = 1;
}

// SubscribeRequest registers interest in one or more VSS signals.
message SubscribeRequest {
  repeated Field entries = 1;
}

// SubscribeResponse is a stream event containing updated signal values.
message SubscribeResponse {
  repeated DataEntry updates = 1;
}

// Error describes a failure for a specific VSS path.
message Error {
  uint32 code = 1;
  string reason = 2;
  string message = 3;
}

// VALService provides access to the Eclipse Kuksa Databroker.
service VALService {
  // Get retrieves the current value of one or more VSS signals.
  rpc Get(GetRequest) returns (GetResponse);

  // Set updates the value of one or more VSS actuator signals.
  rpc Set(SetRequest) returns (SetResponse);

  // Subscribe streams value changes for one or more VSS signals.
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
}
