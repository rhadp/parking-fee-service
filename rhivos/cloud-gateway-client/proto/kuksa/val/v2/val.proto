// Minimal subset of the kuksa.val.v2 API used by CLOUD_GATEWAY_CLIENT.
//
// Field numbers match the actual kuksa-databroker 0.5.0 wire format so that
// this client interoperates with the real server binary.  Array types are
// omitted because the signals consumed by this service use scalar types only.

syntax = "proto3";

package kuksa.val.v2;

// SignalID selects a signal by its full VSS path or by its numeric ID.
// This client always uses the path variant.
message SignalID {
  oneof signal {
    int32 id = 1;
    string path = 2;
  }
}

// Value holds a single typed scalar from a VSS signal.
message Value {
  oneof typed_value {
    string string  = 11;
    bool   bool    = 12;
    sint32 int32   = 13;
    sint64 int64   = 14;
    uint32 uint32  = 15;
    uint64 uint64  = 16;
    float  float   = 17;
    double double  = 18;
  }
}

// Datapoint is a value observed at a point in time.
// The timestamp field (field 1, a google.protobuf.Timestamp) is sent by the
// server but intentionally omitted here because this client does not use it —
// proto3 silently ignores unknown fields on both sides.
message Datapoint {
  Value value = 2;
}

// SubscribeRequest registers interest in one or more VSS signals by path.
message SubscribeRequest {
  repeated string signal_paths = 1;
}

// SubscribeResponse contains the current values of subscribed signals.
// The map key is the VSS path string.
message SubscribeResponse {
  map<string, Datapoint> entries = 1;
}

// ActuateRequest commands an actuator signal to a new value.
message ActuateRequest {
  SignalID signal_id = 1;
  Value    value     = 2;
}

// ActuateResponse is returned after a successful Actuate call.
message ActuateResponse {}

// PublishValueRequest sets a sensor signal value (used by providers).
message PublishValueRequest {
  SignalID  signal_id  = 1;
  Datapoint data_point = 2;
}

// PublishValueResponse is returned after a successful PublishValue call.
message PublishValueResponse {}

// GetValueRequest retrieves the current value of a single signal.
message GetValueRequest {
  SignalID signal_id = 1;
}

// GetValueResponse returns the current datapoint for the requested signal.
message GetValueResponse {
  Datapoint data_point = 1;
}

// VAL provides access to the Eclipse Kuksa Databroker.
service VAL {
  // Subscribe streams value-change events for the requested signals.
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);

  // Actuate sets the target value of an actuator signal.
  rpc Actuate(ActuateRequest) returns (ActuateResponse);

  // PublishValue sets the current value of a sensor signal.
  rpc PublishValue(PublishValueRequest) returns (PublishValueResponse);

  // GetValue returns the current value of a single signal.
  rpc GetValue(GetValueRequest) returns (GetValueResponse);
}
