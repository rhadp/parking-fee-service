[package]
name = "cloud-gateway-client"
version = "0.1.0"
edition = "2021"
description = "MQTT bridge between cloud gateway and vehicle DATA_BROKER"

[dependencies]
databroker-client = { path = "../databroker-client" }
tokio = { workspace = true }
tokio-stream = { workspace = true }
rumqttc = "0.24"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
databroker-client = { path = "../databroker-client" }
tokio = { workspace = true }
tokio-stream = { workspace = true }
rumqttc = "0.24"
serde_json = "1"

[[test]]
name = "integration"
path = "tests/integration.rs"
