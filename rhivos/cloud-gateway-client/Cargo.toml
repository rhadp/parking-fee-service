[package]
name = "cloud-gateway-client"
version = "0.1.0"
edition = "2021"

[features]
integration = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tokio = { version = "1", features = ["full"] }
async-nats = "0.38"
tonic = "0.12"
prost = "0.13"
prost-types = "0.13"
tower = "0.4"
hyper-util = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
bytes = "1"
futures = "0.3"

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
tokio-test = "0.4"
