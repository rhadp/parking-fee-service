[package]
name = "cloud-gateway-client"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "cloud-gateway-client"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
async-nats = "0.35"
tonic = { version = "0.11", features = ["transport"] }
prost = "0.12"
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
proptest = "1"

[build-dependencies]
tonic-build = "0.11"
