[package]
name = "cloud-gateway-client"
version = "0.1.0"
edition = "2021"

[dependencies]
async-nats = "0.38"
bytes = "1"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]

[features]
integration = []
