// Kuksa Databroker v1 VAL service — minimal definition for LOCKING_SERVICE.
// Derived from the official kuksa.val.v1 proto specification.
syntax = "proto3";

package kuksa.val.v1;

import "kuksa/val/v1/types.proto";

// Vehicle Abstraction Layer — the core Kuksa Databroker gRPC service.
service VAL {
  // Get current value(s) of one or more VSS signals.
  rpc Get(GetRequest) returns (GetResponse);

  // Set value(s) of one or more VSS signals.
  rpc Set(SetRequest) returns (SetResponse);

  // Subscribe to change notifications for VSS signals (server-streaming).
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);

  // Return server version and name.
  rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);
}

// ── Get ────────────────────────────────────────────────────────────────────────

message GetRequest {
  repeated EntryRequest entries = 1;
}

message GetResponse {
  repeated DataEntry entries = 1;
  repeated Error errors = 2;
}

// ── Set ────────────────────────────────────────────────────────────────────────

message SetRequest {
  repeated EntryUpdate updates = 1;
}

message SetResponse {
  repeated Error errors = 2;
}

// ── Subscribe ──────────────────────────────────────────────────────────────────

message SubscribeRequest {
  repeated SubscribeEntry entries = 1;
}

message SubscribeResponse {
  repeated EntryUpdate updates = 1;
}

// ── Server info ────────────────────────────────────────────────────────────────

message GetServerInfoRequest {}

message GetServerInfoResponse {
  string name = 1;
  string version = 2;
}
