syntax = "proto3";

package parking.adaptor;

option go_package = "github.com/rhadp/parking-fee-service/gen/parking/adaptor";

// RateInfo describes the pricing structure for a parking session.
message RateInfo {
  string rate_type = 1; // "per_hour" or "flat_fee"
  double amount = 2;
  string currency = 3;
}

// StartSessionRequest initiates a parking session for the given zone.
message StartSessionRequest {
  string zone_id = 1;
}

// StartSessionResponse is returned by StartSession on success.
message StartSessionResponse {
  string session_id = 1;
  string status = 2;
  RateInfo rate = 3;
}

// StopSessionRequest terminates the active parking session.
message StopSessionRequest {}

// StopSessionResponse is returned by StopSession on success.
message StopSessionResponse {
  string session_id = 1;
  string status = 2;
  uint64 duration_seconds = 3;
  double total_amount = 4;
  string currency = 5;
}

// GetStatusRequest requests the current session status.
message GetStatusRequest {}

// GetStatusResponse describes the current session state.
message GetStatusResponse {
  bool active = 1;
  string session_id = 2;
  string zone_id = 3;
  int64 start_time = 4;
  RateInfo rate = 5;
}

// GetRateRequest requests the cached parking rate.
message GetRateRequest {}

// GetRateResponse describes the rate for the current session.
message GetRateResponse {
  string rate_type = 1;
  double amount = 2;
  string currency = 3;
}

// ParkingAdaptor is the gRPC interface exposed by PARKING_OPERATOR_ADAPTOR.
service ParkingAdaptor {
  // StartSession begins a parking session for the given zone.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // StopSession ends the active parking session.
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);

  // GetStatus returns the current session status.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetRate returns the cached rate from the active session.
  rpc GetRate(GetRateRequest) returns (GetRateResponse);
}
