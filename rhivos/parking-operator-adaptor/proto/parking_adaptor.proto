syntax = "proto3";

package parking.adaptor;

// Rate describes the fee structure for a parking session.
message Rate {
  // rate_type is "per_hour" or "flat_fee".
  string rate_type = 1;
  double amount = 2;
  string currency = 3;
}

// StartSessionRequest initiates a new parking session.
message StartSessionRequest {
  string zone_id = 1;
}

// StartSessionResponse contains the new session details.
message StartSessionResponse {
  string session_id = 1;
  string status = 2;
  Rate rate = 3;
}

// StopSessionRequest ends the active parking session.
message StopSessionRequest {}

// StopSessionResponse contains the completed session summary.
message StopSessionResponse {
  string session_id = 1;
  string status = 2;
  uint64 duration_seconds = 3;
  double total_amount = 4;
  string currency = 5;
}

// GetStatusRequest queries the current session state.
message GetStatusRequest {}

// GetStatusResponse returns the current session state.
message GetStatusResponse {
  bool active = 1;
  string session_id = 2;
  string zone_id = 3;
  int64 start_time = 4;
  Rate rate = 5;
}

// GetRateRequest queries the cached rate for the active session.
message GetRateRequest {}

// GetRateResponse returns the cached rate.
message GetRateResponse {
  string rate_type = 1;
  double amount = 2;
  string currency = 3;
}

// ParkingAdaptor is the gRPC interface exposed by PARKING_OPERATOR_ADAPTOR.
service ParkingAdaptor {
  // StartSession begins a new parking session (manual override).
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // StopSession ends the active parking session (manual override).
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);

  // GetStatus returns the current session state.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetRate returns the cached rate from the active session.
  rpc GetRate(GetRateRequest) returns (GetRateResponse);
}
