[package]
name = "parking-operator-adaptor"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tonic = "0.12"
prost = "0.13"
prost-types = "0.13"
reqwest = { version = "0.12", features = ["json"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "1"
chrono = "0.4"
tokio-stream = "0.1"
tower = "0.4"
http = "1"
hyper-util = "0.1"

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]
mockall = "0.13"
tokio-test = "0.4"
axum = "0.7"
proptest = "1"

[features]
integration = []
