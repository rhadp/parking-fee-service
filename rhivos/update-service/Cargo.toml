[package]
name = "update-service"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "update-service"
path = "src/main.rs"

[lib]
name = "update_service"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tonic = "0.11"
prost = "0.12"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
futures = "0.3"

[dev-dependencies]
proptest = "1"
tokio-test = "0.4"
tempfile = "3"

[build-dependencies]
tonic-build = "0.11"
