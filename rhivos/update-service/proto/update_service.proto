syntax = "proto3";

package update;

option go_package = "github.com/sdv-demo/proto/update";

import "google/protobuf/empty.proto";

// AdapterState represents the lifecycle state of an installed adapter.
enum AdapterState {
  ADAPTER_STATE_UNKNOWN = 0;
  ADAPTER_STATE_DOWNLOADING = 1;
  ADAPTER_STATE_INSTALLING = 2;
  ADAPTER_STATE_RUNNING = 3;
  ADAPTER_STATE_STOPPED = 4;
  ADAPTER_STATE_ERROR = 5;
  ADAPTER_STATE_OFFLOADING = 6;
}

message InstallAdapterRequest {
  string image_ref = 1;
  string checksum_sha256 = 2;
}

message InstallAdapterResponse {
  string job_id = 1;
  string adapter_id = 2;
  AdapterState state = 3;
}

message WatchAdapterStatesRequest {
  // Optional: filter by adapter_id. If empty, watch all adapters.
  repeated string adapter_ids = 1;
}

message AdapterStateEvent {
  string adapter_id = 1;
  AdapterState old_state = 2;
  AdapterState new_state = 3;
  int64 timestamp = 4;
}

message ListAdaptersRequest {}

message AdapterInfo {
  string adapter_id = 1;
  string image_ref = 2;
  AdapterState state = 3;
}

message ListAdaptersResponse {
  repeated AdapterInfo adapters = 1;
}

message RemoveAdapterRequest {
  string adapter_id = 1;
}

message GetAdapterStatusRequest {
  string adapter_id = 1;
}

// UpdateService manages lifecycle of parking operator adapter containers.
service UpdateService {
  // InstallAdapter downloads and installs a new adapter image.
  rpc InstallAdapter(InstallAdapterRequest) returns (InstallAdapterResponse);

  // WatchAdapterStates streams adapter state-change events.
  rpc WatchAdapterStates(WatchAdapterStatesRequest) returns (stream AdapterStateEvent);

  // ListAdapters returns all installed adapters and their current states.
  rpc ListAdapters(ListAdaptersRequest) returns (ListAdaptersResponse);

  // RemoveAdapter uninstalls an adapter.
  rpc RemoveAdapter(RemoveAdapterRequest) returns (google.protobuf.Empty);

  // GetAdapterStatus returns the current state of a specific adapter.
  rpc GetAdapterStatus(GetAdapterStatusRequest) returns (AdapterInfo);
}
