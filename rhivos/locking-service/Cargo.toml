[package]
name = "locking-service"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tonic = "0.12"
prost = "0.13"
prost-types = "0.13"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower = "0.4"
hyper-util = "0.1"
http = "1"

[build-dependencies]
tonic-build = "0.12"

[dev-dependencies]

[features]
integration = []
