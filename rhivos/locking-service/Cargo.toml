[package]
name = "locking-service"
version = "0.1.0"
edition = "2021"

[dependencies]
futures = "0.3"
prost = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tonic = { version = "0.11", features = ["transport"] }
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
proptest = "1"
tokio-test = "0.4"

[build-dependencies]
tonic-build = "0.11"
