// Minimal vendored subset of Eclipse Kuksa Databroker VAL service.
// Source: https://github.com/eclipse-kuksa/kuksa-databroker
// License: Apache-2.0
//
// Only the Set RPC (used by mock-sensors) is included.

syntax = "proto3";

package kuksa.val.v1;

import "kuksa/val/v1/types.proto";

service VAL {
  // Set one or more datapoint values.
  rpc Set(SetRequest) returns (SetResponse);
}

message SetRequest {
  repeated EntryUpdate updates = 1;
}

message SetResponse {
  Error error = 1;
  repeated DataEntryError errors = 2;
}
