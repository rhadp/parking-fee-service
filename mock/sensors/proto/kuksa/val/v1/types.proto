// Minimal vendored subset of Eclipse Kuksa Databroker types.
// Source: https://github.com/eclipse-kuksa/kuksa-databroker
// License: Apache-2.0
//
// Only the types required by mock-sensors are included.

syntax = "proto3";

package kuksa.val.v1;

import "google/protobuf/timestamp.proto";

// A datapoint value with timestamp.
message Datapoint {
  google.protobuf.Timestamp timestamp = 1;

  oneof value {
    string string = 11;
    bool bool = 12;
    int32 int32 = 13;
    int64 int64 = 14;
    uint32 uint32 = 15;
    uint64 uint64 = 16;
    float float = 17;
    double double = 18;
  }
}

// A VSS data entry.
message DataEntry {
  string path = 1;
  Datapoint value = 2;
}

// Specifies which entry fields to update.
message EntryUpdate {
  DataEntry entry = 1;
  repeated Field fields = 2;
}

// Selectable fields of a DataEntry.
enum Field {
  FIELD_UNSPECIFIED = 0;
  FIELD_PATH = 1;
  FIELD_VALUE = 2;
  FIELD_ACTUATOR_TARGET = 3;
  FIELD_METADATA = 10;
}

// Error details.
message Error {
  uint32 code = 1;
  string reason = 2;
  string message = 3;
}

// Error associated with a specific data entry path.
message DataEntryError {
  string path = 1;
  Error error = 2;
}
