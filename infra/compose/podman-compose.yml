# SDV Parking Demo System - Local Development Infrastructure
#
# This Podman Compose configuration provides a containerized local development
# environment for testing component interactions without cloud dependencies.
#
# Services:
#   - mosquitto: Eclipse Mosquitto MQTT broker for vehicle-to-cloud communication
#   - kuksa-databroker: Eclipse Kuksa Databroker for VSS signal pub/sub
#   - mock-parking-operator: Mock parking operator service for testing
#
# Usage:
#   podman-compose up -d        # Start all services
#   podman-compose down         # Stop all services
#   podman-compose logs -f      # Follow logs
#
# Requirements: 3.1, 3.2, 3.3, 3.6

version: '3.8'

services:
  # Eclipse Mosquitto MQTT Broker
  # Simulates vehicle-to-cloud communication channel
  # Requirements: 3.2
  mosquitto:
    image: docker.io/eclipse-mosquitto:2.0
    container_name: sdv-mosquitto
    ports:
      - "1883:1883"   # MQTT (unencrypted, dev only)
      - "8883:8883"   # MQTT over TLS
      - "9001:9001"   # WebSocket (optional)
    volumes:
      - ../config/mosquitto:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - sdv-network

  # Eclipse Kuksa Databroker
  # Provides VSS-compliant gRPC pub/sub interface for vehicle signals
  # Requirements: 3.3
  # Note: Using port 55556 instead of 55556 (55556 is blocked on macOS)
  # Note: Health check disabled - container is minimal (no shell/tools available)
  #       Service health can be verified externally via: nc -zv localhost 55556
  kuksa-databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.4.4
    container_name: sdv-kuksa-databroker
    ports:
      - "55556:55556"  # gRPC API
    volumes:
      - ../config/kuksa:/config:ro
    command:
      - --address
      - "0.0.0.0"
      - --port
      - "55556"
      - --insecure
    healthcheck:
      # Minimal container has no shell - using NONE and relying on container status
      # External verification: nc -zv localhost 55556 or grpcurl -plaintext localhost:55556 list
      test: ["NONE"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - sdv-network

  # Mock Parking Operator Service
  # Simulates external parking operator API for testing
  # Requirements: 3.4
  mock-parking-operator:
    build:
      context: ../..
      dockerfile: containers/mock/Containerfile.parking-operator
    container_name: sdv-mock-parking-operator
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
      - MOCK_DELAY_MS=100
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sdv-network

  # Parking Fee Service
  # Backend service for parking session management
  parking-fee-service:
    build:
      context: ../..
      dockerfile: containers/backend/Containerfile.parking-fee-service
    container_name: sdv-parking-fee-service
    ports:
      - "8081:8081"
    environment:
      - LOG_LEVEL=info
      - PORT=8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - sdv-network

  # Cloud Gateway
  # REST API gateway for companion app and MQTT bridge to vehicles
  # Requirements: 15.1, 15.2
  cloud-gateway:
    build:
      context: ../..
      dockerfile: containers/backend/Containerfile.cloud-gateway
    container_name: sdv-cloud-gateway
    ports:
      - "8082:8080"
    environment:
      - LOG_LEVEL=info
      - PORT=8080
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - MQTT_CLIENT_ID=cloud-gateway
      - CONFIGURED_VIN=TEST_VIN_001
      - COMMAND_TIMEOUT_SECONDS=30
      - MAX_COMMANDS=100
      - PARKING_FEE_SERVICE_URL=http://parking-fee-service:8081
      # OTLP_ENDPOINT is optional, uncomment to enable telemetry export
      # - OTLP_ENDPOINT=http://otel-collector:4317
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      mosquitto:
        condition: service_healthy
      parking-fee-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sdv-network

networks:
  sdv-network:
    driver: bridge
    name: sdv-parking-demo

volumes:
  mosquitto-data:
  mosquitto-log:
