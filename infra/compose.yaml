# Local Development Infrastructure
#
# Starts Eclipse Kuksa Databroker and Eclipse Mosquitto for local development.
#
# Usage:
#   make infra-up     — start services
#   make infra-down   — stop and remove services
#   make infra-status — show service status
#
# Or directly:
#   podman compose -f infra/compose.yaml up -d
#   podman compose -f infra/compose.yaml down

services:
  databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.5
    ports:
      - "55555:55555"
    environment:
      - KUKSA_DATA_BROKER_ADDR=0.0.0.0
      - KUKSA_DATA_BROKER_PORT=55555

  mosquitto:
    image: docker.io/library/eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
