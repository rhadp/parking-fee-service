# Development Mode Configuration
# SDV Parking Demo System
#
# This file documents environment variables and settings for local development.
# These settings allow disabling TLS verification and other production
# security features for easier local testing.
#
# Requirements: 5.6
#
# ⚠️ WARNING: These settings are for DEVELOPMENT ONLY.
#             NEVER use these settings in production environments.

# =============================================================================
# Environment Variables
# =============================================================================
# Set these environment variables to configure development mode behavior.

environment_variables:
  # -----------------------------------------------------------------------------
  # TLS Configuration
  # -----------------------------------------------------------------------------
  
  # Skip TLS certificate verification (DEVELOPMENT ONLY)
  # When set to "true", services will not verify TLS certificates.
  # This is useful when using self-signed certificates in local development.
  SDV_TLS_SKIP_VERIFY:
    description: "Skip TLS certificate verification"
    type: boolean
    default: "false"
    values:
      - "true"   # Disable TLS verification (INSECURE)
      - "false"  # Enable TLS verification (default)
    warning: "Setting to 'true' disables security. Use only in development."
    example: "export SDV_TLS_SKIP_VERIFY=true"

  # Disable TLS entirely (DEVELOPMENT ONLY)
  # When set to "true", services will use plain-text connections.
  # This is useful for debugging with tools like grpcurl without TLS.
  SDV_TLS_DISABLED:
    description: "Disable TLS entirely for all connections"
    type: boolean
    default: "false"
    values:
      - "true"   # Disable TLS (INSECURE)
      - "false"  # Enable TLS (default)
    warning: "Setting to 'true' exposes all traffic in plain text."
    example: "export SDV_TLS_DISABLED=true"

  # Custom CA certificate path
  # Override the default CA certificate location for development.
  SDV_TLS_CA_FILE:
    description: "Path to custom CA certificate file"
    type: string
    default: ""
    example: "export SDV_TLS_CA_FILE=/path/to/ca.crt"

  # Custom client certificate path (for mTLS)
  SDV_TLS_CERT_FILE:
    description: "Path to client certificate file for mTLS"
    type: string
    default: ""
    example: "export SDV_TLS_CERT_FILE=/path/to/client.crt"

  # Custom client key path (for mTLS)
  SDV_TLS_KEY_FILE:
    description: "Path to client private key file for mTLS"
    type: string
    default: ""
    example: "export SDV_TLS_KEY_FILE=/path/to/client.key"

  # -----------------------------------------------------------------------------
  # Service Discovery
  # -----------------------------------------------------------------------------

  # Override DATA_BROKER address
  SDV_DATABROKER_ADDRESS:
    description: "Override DATA_BROKER service address"
    type: string
    default: "localhost:55556"
    example: "export SDV_DATABROKER_ADDRESS=192.168.1.100:55556"

  # Override UPDATE_SERVICE address
  SDV_UPDATE_SERVICE_ADDRESS:
    description: "Override UPDATE_SERVICE address"
    type: string
    default: "localhost:50051"
    example: "export SDV_UPDATE_SERVICE_ADDRESS=192.168.1.100:50051"

  # Override PARKING_ADAPTOR address
  SDV_PARKING_ADAPTOR_ADDRESS:
    description: "Override PARKING_ADAPTOR address"
    type: string
    default: "localhost:50052"
    example: "export SDV_PARKING_ADAPTOR_ADDRESS=192.168.1.100:50052"

  # Override LOCKING_SERVICE address (or UDS path)
  SDV_LOCKING_SERVICE_ADDRESS:
    description: "Override LOCKING_SERVICE address or UDS path"
    type: string
    default: "unix:///run/rhivos/locking.sock"
    example: "export SDV_LOCKING_SERVICE_ADDRESS=localhost:50053"

  # Override MQTT broker address
  SDV_MQTT_BROKER_ADDRESS:
    description: "Override MQTT broker address"
    type: string
    default: "localhost:8883"
    example: "export SDV_MQTT_BROKER_ADDRESS=mqtt.example.com:8883"

  # -----------------------------------------------------------------------------
  # Logging and Debugging
  # -----------------------------------------------------------------------------

  # Enable debug logging
  SDV_LOG_LEVEL:
    description: "Set logging verbosity level"
    type: string
    default: "info"
    values:
      - "trace"  # Most verbose
      - "debug"  # Debug information
      - "info"   # Normal operation (default)
      - "warn"   # Warnings only
      - "error"  # Errors only
    example: "export SDV_LOG_LEVEL=debug"

  # Enable gRPC debug logging
  GRPC_VERBOSITY:
    description: "gRPC library verbosity level"
    type: string
    default: "ERROR"
    values:
      - "DEBUG"
      - "INFO"
      - "ERROR"
    example: "export GRPC_VERBOSITY=DEBUG"

  # Enable gRPC trace logging
  GRPC_TRACE:
    description: "gRPC trace categories (comma-separated)"
    type: string
    default: ""
    example: "export GRPC_TRACE=all"

  # -----------------------------------------------------------------------------
  # Development Features
  # -----------------------------------------------------------------------------

  # Enable mock mode for services
  SDV_MOCK_MODE:
    description: "Enable mock responses for external services"
    type: boolean
    default: "false"
    example: "export SDV_MOCK_MODE=true"

  # Simulate network latency (milliseconds)
  SDV_SIMULATE_LATENCY_MS:
    description: "Add artificial latency to service calls"
    type: integer
    default: "0"
    example: "export SDV_SIMULATE_LATENCY_MS=100"

  # Simulate failure rate (0.0 to 1.0)
  SDV_SIMULATE_FAILURE_RATE:
    description: "Probability of simulated failures (0.0-1.0)"
    type: float
    default: "0.0"
    example: "export SDV_SIMULATE_FAILURE_RATE=0.1"

  # -----------------------------------------------------------------------------
  # Failure Simulation (Demo Scenarios)
  # -----------------------------------------------------------------------------
  # These settings enable simulation of specific failure scenarios for demos
  # and testing error handling paths.
  # Requirements: 7.5

  # Simulate registry unavailability
  SDV_SIMULATE_REGISTRY_UNAVAILABLE:
    description: "Simulate OCI registry being unavailable"
    type: boolean
    default: "false"
    values:
      - "true"   # Registry calls will fail with UNAVAILABLE error
      - "false"  # Normal registry operation (default)
    use_case: "Demo Scenario 3: Error Handling - Registry unavailable"
    example: "export SDV_SIMULATE_REGISTRY_UNAVAILABLE=true"

  # Simulate registry timeout (seconds)
  SDV_SIMULATE_REGISTRY_TIMEOUT_SEC:
    description: "Simulate registry timeout after N seconds (0 = no timeout)"
    type: integer
    default: "0"
    use_case: "Testing timeout handling in UPDATE_SERVICE"
    example: "export SDV_SIMULATE_REGISTRY_TIMEOUT_SEC=30"

  # Simulate network failures
  SDV_SIMULATE_NETWORK_FAILURE:
    description: "Simulate network connectivity failures"
    type: boolean
    default: "false"
    values:
      - "true"   # Network calls will fail with UNAVAILABLE error
      - "false"  # Normal network operation (default)
    use_case: "Testing offline/disconnected scenarios"
    example: "export SDV_SIMULATE_NETWORK_FAILURE=true"

  # Simulate network partition (specific services)
  SDV_SIMULATE_PARTITION_SERVICES:
    description: "Comma-separated list of services to simulate as unreachable"
    type: string
    default: ""
    values:
      - "databroker"      # DATA_BROKER unreachable
      - "update_service"  # UPDATE_SERVICE unreachable
      - "parking_adaptor" # PARKING_ADAPTOR unreachable
      - "mqtt_broker"     # MQTT broker unreachable
      - "registry"        # OCI registry unreachable
    use_case: "Testing partial network failures"
    example: "export SDV_SIMULATE_PARTITION_SERVICES=registry,mqtt_broker"

  # Simulate checksum mismatch on adapter download
  SDV_SIMULATE_CHECKSUM_MISMATCH:
    description: "Simulate checksum verification failure on adapter download"
    type: boolean
    default: "false"
    use_case: "Testing security validation in UPDATE_SERVICE"
    example: "export SDV_SIMULATE_CHECKSUM_MISMATCH=true"

  # Simulate adapter installation failure
  SDV_SIMULATE_ADAPTER_INSTALL_FAILURE:
    description: "Simulate adapter container failing to start"
    type: boolean
    default: "false"
    use_case: "Testing adapter lifecycle error handling"
    example: "export SDV_SIMULATE_ADAPTER_INSTALL_FAILURE=true"

  # Simulate MQTT connection failure
  SDV_SIMULATE_MQTT_FAILURE:
    description: "Simulate MQTT broker connection failure"
    type: boolean
    default: "false"
    use_case: "Testing vehicle-to-cloud communication failures"
    example: "export SDV_SIMULATE_MQTT_FAILURE=true"

  # Simulate intermittent failures (percentage)
  SDV_SIMULATE_INTERMITTENT_RATE:
    description: "Rate of intermittent failures (0-100%)"
    type: integer
    default: "0"
    use_case: "Testing retry logic and resilience"
    example: "export SDV_SIMULATE_INTERMITTENT_RATE=20"

# =============================================================================
# Development Mode Profiles
# =============================================================================
# Pre-configured profiles for common development scenarios.

profiles:
  # Local development with self-signed certificates
  local_tls:
    description: "Local development with TLS using self-signed certificates"
    environment:
      SDV_TLS_SKIP_VERIFY: "true"
      SDV_TLS_CA_FILE: "infra/certs/ca/ca.crt"
      SDV_TLS_CERT_FILE: "infra/certs/client/client.crt"
      SDV_TLS_KEY_FILE: "infra/certs/client/client.key"
      SDV_LOG_LEVEL: "debug"
    script: |
      export SDV_TLS_SKIP_VERIFY=true
      export SDV_TLS_CA_FILE=infra/certs/ca/ca.crt
      export SDV_TLS_CERT_FILE=infra/certs/client/client.crt
      export SDV_TLS_KEY_FILE=infra/certs/client/client.key
      export SDV_LOG_LEVEL=debug

  # Local development without TLS (plain text)
  local_insecure:
    description: "Local development without TLS (INSECURE)"
    warning: "All traffic will be unencrypted. Use only for debugging."
    environment:
      SDV_TLS_DISABLED: "true"
      SDV_LOG_LEVEL: "debug"
    script: |
      export SDV_TLS_DISABLED=true
      export SDV_LOG_LEVEL=debug

  # Debug mode with verbose logging
  debug:
    description: "Debug mode with maximum verbosity"
    environment:
      SDV_LOG_LEVEL: "trace"
      GRPC_VERBOSITY: "DEBUG"
      GRPC_TRACE: "all"
    script: |
      export SDV_LOG_LEVEL=trace
      export GRPC_VERBOSITY=DEBUG
      export GRPC_TRACE=all

  # Mock mode for testing without real services
  mock:
    description: "Mock mode for isolated testing"
    environment:
      SDV_MOCK_MODE: "true"
      SDV_LOG_LEVEL: "debug"
    script: |
      export SDV_MOCK_MODE=true
      export SDV_LOG_LEVEL=debug

  # Chaos testing with simulated failures
  chaos:
    description: "Chaos testing with simulated failures and latency"
    environment:
      SDV_SIMULATE_LATENCY_MS: "100"
      SDV_SIMULATE_FAILURE_RATE: "0.1"
      SDV_LOG_LEVEL: "debug"
    script: |
      export SDV_SIMULATE_LATENCY_MS=100
      export SDV_SIMULATE_FAILURE_RATE=0.1
      export SDV_LOG_LEVEL=debug

  # -----------------------------------------------------------------------------
  # Demo Scenario Profiles
  # -----------------------------------------------------------------------------
  # Pre-configured profiles for the three main demo scenarios.
  # See docs/demo-scenarios.md for detailed scenario descriptions.

  # Demo Scenario 1: Happy Path
  demo_happy_path:
    description: "Demo Scenario 1: Happy Path - Adapter downloads and manages parking session"
    environment:
      SDV_LOG_LEVEL: "info"
      SDV_TLS_SKIP_VERIFY: "true"
      SDV_SIMULATE_REGISTRY_UNAVAILABLE: "false"
      SDV_SIMULATE_NETWORK_FAILURE: "false"
    script: |
      # Demo Scenario 1: Happy Path
      # Adapter downloads successfully and manages parking session
      export SDV_LOG_LEVEL=info
      export SDV_TLS_SKIP_VERIFY=true
      export SDV_SIMULATE_REGISTRY_UNAVAILABLE=false
      export SDV_SIMULATE_NETWORK_FAILURE=false
      echo "Demo Scenario 1: Happy Path configured"

  # Demo Scenario 2: Adapter Already Installed
  demo_adapter_installed:
    description: "Demo Scenario 2: Adapter Already Installed - No download needed"
    environment:
      SDV_LOG_LEVEL: "info"
      SDV_TLS_SKIP_VERIFY: "true"
      SDV_SIMULATE_REGISTRY_UNAVAILABLE: "false"
      SDV_SIMULATE_NETWORK_FAILURE: "false"
    notes: |
      For this scenario, ensure the parking operator adapter is pre-installed
      before starting the demo. Use: make install-demo-adapter
    script: |
      # Demo Scenario 2: Adapter Already Installed
      # Pre-install adapter before demo
      export SDV_LOG_LEVEL=info
      export SDV_TLS_SKIP_VERIFY=true
      export SDV_SIMULATE_REGISTRY_UNAVAILABLE=false
      export SDV_SIMULATE_NETWORK_FAILURE=false
      echo "Demo Scenario 2: Adapter Already Installed configured"
      echo "Note: Ensure adapter is pre-installed before demo"

  # Demo Scenario 3: Error Handling - Registry Unavailable
  demo_registry_error:
    description: "Demo Scenario 3: Error Handling - Registry unavailable"
    environment:
      SDV_LOG_LEVEL: "debug"
      SDV_TLS_SKIP_VERIFY: "true"
      SDV_SIMULATE_REGISTRY_UNAVAILABLE: "true"
      SDV_SIMULATE_NETWORK_FAILURE: "false"
    script: |
      # Demo Scenario 3: Error Handling - Registry Unavailable
      # Simulates registry being down during adapter download
      export SDV_LOG_LEVEL=debug
      export SDV_TLS_SKIP_VERIFY=true
      export SDV_SIMULATE_REGISTRY_UNAVAILABLE=true
      export SDV_SIMULATE_NETWORK_FAILURE=false
      echo "Demo Scenario 3: Registry Unavailable configured"
      echo "UPDATE_SERVICE will return UNAVAILABLE errors"

  # Demo Scenario 3 Variant: Network Failure
  demo_network_error:
    description: "Demo Scenario 3 Variant: Network connectivity failure"
    environment:
      SDV_LOG_LEVEL: "debug"
      SDV_TLS_SKIP_VERIFY: "true"
      SDV_SIMULATE_NETWORK_FAILURE: "true"
    script: |
      # Demo Scenario 3 Variant: Network Failure
      # Simulates complete network connectivity loss
      export SDV_LOG_LEVEL=debug
      export SDV_TLS_SKIP_VERIFY=true
      export SDV_SIMULATE_NETWORK_FAILURE=true
      echo "Demo Scenario 3 Variant: Network Failure configured"
      echo "All network calls will fail"

  # Demo Scenario 3 Variant: Partial Network Partition
  demo_partial_partition:
    description: "Demo Scenario 3 Variant: Partial network partition (registry only)"
    environment:
      SDV_LOG_LEVEL: "debug"
      SDV_TLS_SKIP_VERIFY: "true"
      SDV_SIMULATE_PARTITION_SERVICES: "registry"
    script: |
      # Demo Scenario 3 Variant: Partial Network Partition
      # Only registry is unreachable, other services work
      export SDV_LOG_LEVEL=debug
      export SDV_TLS_SKIP_VERIFY=true
      export SDV_SIMULATE_PARTITION_SERVICES=registry
      echo "Demo Scenario 3 Variant: Partial Partition configured"
      echo "Registry unreachable, other services operational"

# =============================================================================
# Usage Examples
# =============================================================================
# 
# 1. Start local infrastructure with TLS disabled:
#    
#    export SDV_TLS_DISABLED=true
#    make infra-up
#
# 2. Run a service with debug logging:
#    
#    export SDV_LOG_LEVEL=debug
#    cargo run -p locking-service
#
# 3. Use a development profile:
#    
#    source <(grep -A100 'local_tls:' infra/config/development.yaml | \
#             grep -A10 'script:' | tail -n+2 | sed 's/^      //')
#
# 4. Test with grpcurl (no TLS):
#    
#    export SDV_TLS_DISABLED=true
#    grpcurl -plaintext localhost:55556 list
#
# 5. Test with grpcurl (self-signed TLS):
#    
#    grpcurl -cacert infra/certs/ca/ca.crt \
#            -cert infra/certs/client/client.crt \
#            -key infra/certs/client/client.key \
#            localhost:55556 list

# =============================================================================
# Language-Specific Configuration
# =============================================================================

rust:
  description: "Rust service configuration"
  notes: |
    Rust services read environment variables at startup.
    Use the `config` crate for structured configuration.
  example: |
    // In Rust code:
    let skip_verify = std::env::var("SDV_TLS_SKIP_VERIFY")
        .map(|v| v == "true")
        .unwrap_or(false);

go:
  description: "Go service configuration"
  notes: |
    Go services use os.Getenv() for environment variables.
    Consider using viper for structured configuration.
  example: |
    // In Go code:
    skipVerify := os.Getenv("SDV_TLS_SKIP_VERIFY") == "true"
    
    if skipVerify {
        tlsConfig := &tls.Config{InsecureSkipVerify: true}
    }

kotlin:
  description: "Kotlin/Android configuration"
  notes: |
    Android apps use BuildConfig or system properties.
    For local testing, use ADB to set properties.
  example: |
    // In Kotlin code:
    val skipVerify = BuildConfig.SDV_TLS_SKIP_VERIFY
    
    // Or via system property:
    val skipVerify = System.getProperty("sdv.tls.skip_verify") == "true"

dart:
  description: "Dart/Flutter configuration"
  notes: |
    Flutter apps use Platform.environment or --dart-define.
    For local testing, use flutter run --dart-define.
  example: |
    // In Dart code:
    final skipVerify = Platform.environment['SDV_TLS_SKIP_VERIFY'] == 'true';
    
    // Or via compile-time define:
    const skipVerify = bool.fromEnvironment('SDV_TLS_SKIP_VERIFY');
