# Eclipse Mosquitto MQTT Broker Configuration
# SDV Parking Demo System - Local Development
#
# This configuration provides both unencrypted (dev) and TLS-secured listeners
# for simulating vehicle-to-cloud MQTT communication.
#
# Requirements: 3.5

# =============================================================================
# General Settings
# =============================================================================

# Persistence settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# =============================================================================
# Listener Configuration
# =============================================================================

# Default MQTT listener (unencrypted - development only)
listener 1883
protocol mqtt
allow_anonymous true

# TLS-secured MQTT listener
listener 8883
protocol mqtt
# TLS certificates (uncomment when certs are generated)
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# require_certificate false
allow_anonymous true

# WebSocket listener (optional, for browser-based clients)
listener 9001
protocol websockets
allow_anonymous true

# =============================================================================
# Security Settings (Development Mode)
# =============================================================================

# In development mode, allow anonymous connections
# For production, configure authentication:
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl

# =============================================================================
# Connection Settings
# =============================================================================

# Maximum connections (0 = unlimited)
max_connections 100

# Keep-alive settings
max_keepalive 120

# Message size limits
message_size_limit 1048576

# =============================================================================
# Topic Settings
# =============================================================================

# Retain messages
retain_available true

# =============================================================================
# Bridge Configuration (for cloud gateway simulation)
# =============================================================================

# Uncomment to configure bridge to external broker
# connection cloud-gateway
# address cloud.example.com:8883
# topic sdv/# out 1
# topic sdv/# in 1
# bridge_cafile /mosquitto/config/certs/ca.crt
# bridge_certfile /mosquitto/config/certs/client.crt
# bridge_keyfile /mosquitto/config/certs/client.key
