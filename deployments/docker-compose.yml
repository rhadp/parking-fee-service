# Local infrastructure for parking-fee-service development
# Provides NATS message broker and Kuksa Databroker for integration testing
#
# Usage:
#   make infra-up    # Start services
#   make infra-down  # Stop and remove services

services:
  nats:
    image: nats:latest
    container_name: parking-nats
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  kuksa-databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:master
    container_name: parking-kuksa-databroker
    ports:
      - "55555:55555"  # gRPC
    healthcheck:
      test: ["CMD-SHELL", "grpcurl -plaintext localhost:55555 list 2>/dev/null || nc -z localhost 55555"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
