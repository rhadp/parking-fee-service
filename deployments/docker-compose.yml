# Local development infrastructure
# Start: make infra-up
# Stop:  make infra-down

name: parking-fee-service

services:
  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.5.0
    container_name: databroker
    ports:
      - "55556:55556"
    volumes:
      - ../config/vss/vss_v5.1.json:/config/vss_v5.1.json:ro
      - ../config/vss/vss_overlay.json:/config/vss_overlay.json:ro
      - /tmp/kuksa:/tmp/kuksa
    command:
      - "--address"
      - "0.0.0.0"
      - "--port"
      - "55556"
      - "--insecure"
      - "--disable-authorization"
      - "--vss"
      - "/config/vss_v5.1.json,/config/vss_overlay.json"
      - "--unix-socket"
      - "/tmp/kuksa/databroker.sock"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=:55556 2>/dev/null || nc -z localhost 55556"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
