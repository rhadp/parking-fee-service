# NATS Server Configuration
# Local development configuration for the parking-fee-service project

port: 4222

# HTTP monitoring port
http_port: 8222

# Enable debug and trace logging in development
debug: false
trace: false

# Maximum payload size (default 1MB)
max_payload: 1048576

# Maximum number of clients
max_connections: 1024

# Logging
log_time: true
