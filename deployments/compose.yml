# Local infrastructure for parking-fee-service development
# Provides NATS message broker and Kuksa Databroker for integration testing.
#
# Usage:
#   make infra-up    # Start containers
#   make infra-down  # Stop and remove containers

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    volumes:
      - ./nats/nats-server.conf:/nats-server.conf
    command: ["--config", "/nats-server.conf"]
    restart: unless-stopped

  kuksa-databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.5.0
    ports:
      - "55556:55555"
    volumes:
      - ./vss-overlay.json:/vss-overlay.json:ro
      - kuksa-uds:/tmp
    command:
      - "--address"
      - "0.0.0.0"
      - "--port"
      - "55555"
      - "--unix-socket"
      - "/tmp/kuksa-databroker.sock"
      - "--vss"
      - "/vss-overlay.json"
    restart: unless-stopped

volumes:
  kuksa-uds:
    driver: local
