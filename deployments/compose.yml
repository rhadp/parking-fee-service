services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.5.0
    container_name: databroker
    command:
      - "--address"
      - "0.0.0.0"
      - "--port"
      - "55556"
      - "--insecure"
      - "--disable-authorization"
      - "--vss"
      - "vss_release_4.0.json,/config/vss_overlay.json"
      - "--unix-socket"
      - "/tmp/kuksa/databroker.sock"
    ports:
      - "55556:55556"
    volumes:
      - ../config/vss/vss_overlay.json:/config/vss_overlay.json:ro
      - kuksa-uds:/tmp/kuksa
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 55556 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  kuksa-uds:
