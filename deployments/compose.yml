services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    command: ["--config", "/etc/nats/nats-server.conf"]
    restart: unless-stopped

  kuksa-databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.6
    ports:
      - "55556:55555"
    volumes:
      - ./vss-overlay.json:/vss-overlay.json:ro
      - /tmp/kuksa:/tmp
    command:
      - "--address"
      - "0.0.0.0"
      - "--port"
      - "55555"
      - "--unix-socket"
      - "/tmp/kuksa-databroker.sock"
      - "--vss"
      - "vss_release_5.1.json,/vss-overlay.json"
    restart: unless-stopped
