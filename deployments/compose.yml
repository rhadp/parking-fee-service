services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    command: ["-c", "/etc/nats/nats-server.conf"]

  kuksa-databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    ports:
      - "55556:55555"
    volumes:
      - ./vss-overlay.json:/app/vss-overlay.json:ro
    command: ["--address", "0.0.0.0", "--port", "55555", "--vss", "/app/vss-overlay.json"]
