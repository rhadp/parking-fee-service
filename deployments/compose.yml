services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    command: ["--config", "/etc/nats/nats-server.conf"]
    restart: unless-stopped

  kuksa-databroker:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:0.6
    ports:
      - "55556:55555"
    volumes:
      - ./vss-overlay.json:/home/kuksa/vss-overlay.json:ro
    command: ["--vss", "/home/kuksa/vss-overlay.json"]
    restart: unless-stopped
