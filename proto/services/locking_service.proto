syntax = "proto3";
package sdv.services.locking;

service LockingService {
  // Execute a lock command
  rpc Lock(LockRequest) returns (LockResponse);
  
  // Execute an unlock command
  rpc Unlock(UnlockRequest) returns (UnlockResponse);
  
  // Get current lock state
  rpc GetLockState(GetLockStateRequest) returns (GetLockStateResponse);
}

enum Door {
  DOOR_UNKNOWN = 0;
  DOOR_DRIVER = 1;
  DOOR_PASSENGER = 2;
  DOOR_REAR_LEFT = 3;
  DOOR_REAR_RIGHT = 4;
  DOOR_ALL = 5;
}

message LockRequest {
  Door door = 1;
  string command_id = 2;
  string auth_token = 3;
}

message LockResponse {
  bool success = 1;
  string error_message = 2;
  string command_id = 3;
}

message UnlockRequest {
  Door door = 1;
  string command_id = 2;
  string auth_token = 3;
}

message UnlockResponse {
  bool success = 1;
  string error_message = 2;
  string command_id = 3;
}

message GetLockStateRequest {
  Door door = 1;
}

message GetLockStateResponse {
  Door door = 1;
  bool is_locked = 2;
  bool is_open = 3;
}
