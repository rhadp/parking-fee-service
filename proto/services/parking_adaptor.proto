// Parking Adaptor gRPC service definition
// This service manages parking sessions in the RHIVOS QM partition.

syntax = "proto3";

package sdv.services.parking;

option java_package = "sdv.services.parking";
option java_multiple_files = true;
option go_package = "github.com/sdv-parking-demo/backend/gen/services/parking";

import "google/protobuf/timestamp.proto";

// Session state enumeration
enum SessionState {
  SESSION_STATE_NONE = 0;
  SESSION_STATE_STARTING = 1;
  SESSION_STATE_ACTIVE = 2;
  SESSION_STATE_STOPPING = 3;
  SESSION_STATE_STOPPED = 4;
  SESSION_STATE_ERROR = 5;
}

// ParkingAdaptor service provides parking session management.
// Called by PARKING_APP via gRPC/TLS for manual session control and status.
service ParkingAdaptor {
  // Start a new parking session.
  // Zone_ID is provided by PARKING_APP (obtained from PARKING_FEE_SERVICE).
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // Stop the current parking session.
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);

  // Get the current session status.
  rpc GetSessionStatus(GetSessionStatusRequest) returns (GetSessionStatusResponse);
}

// Request to start a parking session.
message StartSessionRequest {
  // Zone_ID provided by PARKING_APP (obtained from PARKING_FEE_SERVICE based on location)
  string zone_id = 1;
}

// Response from starting a parking session.
message StartSessionResponse {
  // Whether the operation succeeded
  bool success = 1;
  // Error message if failed
  string error_message = 2;
  // Session ID from PARKING_OPERATOR
  string session_id = 3;
  // Current session state
  SessionState state = 4;
}

// Request to stop the current parking session.
message StopSessionRequest {
  // Empty - uses current active session
}

// Response from stopping a parking session.
message StopSessionResponse {
  // Whether the operation succeeded
  bool success = 1;
  // Error message if failed
  string error_message = 2;
  // Session ID that was stopped
  string session_id = 3;
  // Current session state
  SessionState state = 4;
  // Final cost of the session
  double final_cost = 5;
  // Duration of the session in seconds
  int64 duration_seconds = 6;
}

// Request to get session status.
message GetSessionStatusRequest {
  // Empty - returns current/last session
}

// Response with session status information.
message GetSessionStatusResponse {
  // Whether there is an active session
  bool has_active_session = 1;
  // Session ID (empty if no session)
  string session_id = 2;
  // Current session state
  SessionState state = 3;
  // Session start time as Unix timestamp
  int64 start_time_unix = 4;
  // Duration of the session in seconds
  int64 duration_seconds = 5;
  // Current cost of the session
  double current_cost = 6;
  // Zone ID where parked
  string zone_id = 7;
  // Error message if state is ERROR
  string error_message = 8;
  // Latitude where session started
  double latitude = 9;
  // Longitude where session started
  double longitude = 10;
}
