syntax = "proto3";
package parking.services.adapter;
option go_package = "github.com/rhadp/parking-fee-service/proto/gen/go/services/adapter";

import "common/common.proto";

service ParkingAdapter {
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc GetRate(GetRateRequest) returns (GetRateResponse);
}

message StartSessionRequest {
  parking.common.VehicleId vehicle_id = 1;
  string zone_id = 2;
  int64 timestamp = 3;
}

message StartSessionResponse {
  string session_id = 1;
  string status = 2;
}

message StopSessionRequest {
  string session_id = 1;
  int64 timestamp = 2;
}

message StopSessionResponse {
  string status = 1;
  double total_fee = 2;
  int64 duration_seconds = 3;
}

message GetStatusRequest {
  string session_id = 1;
}

message GetStatusResponse {
  string session_id = 1;
  bool active = 2;
  int64 start_time = 3;
  double current_fee = 4;
}

message GetRateRequest {
  string zone_id = 1;
}

message GetRateResponse {
  string zone_id = 1;
  double rate_per_hour = 2;
  string currency = 3;
}
