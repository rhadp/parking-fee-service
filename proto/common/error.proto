// Common error handling types used across all services.

syntax = "proto3";

package sdv.common;

option java_package = "com.sdv.common";
option java_multiple_files = true;
option go_package = "github.com/sdv-parking/backend/gen/common";

// ErrorDetails provides domain-specific error information
// that accompanies standard gRPC status codes.
message ErrorDetails {
  // Domain-specific error code (e.g., INVALID_REQUEST, REGISTRY_UNAVAILABLE)
  string code = 1;
  
  // Human-readable error message
  string message = 2;
  
  // Additional context as key-value pairs
  map<string, string> details = 3;
  
  // Unix timestamp (milliseconds) when the error occurred
  int64 timestamp = 4;
}

// Standard error codes for domain-specific errors
// These codes are used in the ErrorDetails.code field
// alongside standard gRPC status codes.
//
// Error Code Reference:
// | Error Scenario           | gRPC Status Code        | Error Code           |
// |--------------------------|-------------------------|----------------------|
// | Invalid proto message    | INVALID_ARGUMENT (3)    | INVALID_REQUEST      |
// | Service not ready        | FAILED_PRECONDITION (9) | SERVICE_NOT_READY    |
// | Container pull failed    | UNAVAILABLE (14)        | REGISTRY_UNAVAILABLE |
// | Checksum mismatch        | INVALID_ARGUMENT (3)    | CHECKSUM_MISMATCH    |
// | TLS handshake failed     | UNAVAILABLE (14)        | TLS_ERROR            |
// | Socket connection failed | UNAVAILABLE (14)        | CONNECTION_FAILED    |
// | Authentication failed    | UNAUTHENTICATED (16)    | AUTH_FAILED          |
// | Permission denied        | PERMISSION_DENIED (7)   | PERMISSION_DENIED    |
// | Resource not found       | NOT_FOUND (5)           | NOT_FOUND            |
// | Operation timeout        | DEADLINE_EXCEEDED (4)   | TIMEOUT              |
// | Internal error           | INTERNAL (13)           | INTERNAL_ERROR       |

// ErrorCode enum provides type-safe error codes for use in services.
// Services should use these codes in the ErrorDetails.code field.
enum ErrorCode {
  // Default/unknown error
  ERROR_CODE_UNSPECIFIED = 0;
  
  // Invalid request or proto message
  ERROR_CODE_INVALID_REQUEST = 1;
  
  // Service is not ready to handle requests
  ERROR_CODE_SERVICE_NOT_READY = 2;
  
  // Container registry is unavailable
  ERROR_CODE_REGISTRY_UNAVAILABLE = 3;
  
  // Container image checksum does not match expected value
  ERROR_CODE_CHECKSUM_MISMATCH = 4;
  
  // TLS handshake or certificate error
  ERROR_CODE_TLS_ERROR = 5;
  
  // Socket or network connection failed
  ERROR_CODE_CONNECTION_FAILED = 6;
  
  // Authentication failed
  ERROR_CODE_AUTH_FAILED = 7;
  
  // Permission denied for the requested operation
  ERROR_CODE_PERMISSION_DENIED = 8;
  
  // Requested resource was not found
  ERROR_CODE_NOT_FOUND = 9;
  
  // Operation timed out
  ERROR_CODE_TIMEOUT = 10;
  
  // Internal server error
  ERROR_CODE_INTERNAL_ERROR = 11;
  
  // Adapter-specific errors
  ERROR_CODE_ADAPTER_NOT_FOUND = 12;
  ERROR_CODE_ADAPTER_ALREADY_INSTALLED = 13;
  ERROR_CODE_ADAPTER_INSTALL_FAILED = 14;
  
  // Parking session errors
  ERROR_CODE_SESSION_NOT_FOUND = 15;
  ERROR_CODE_SESSION_ALREADY_ACTIVE = 16;
  ERROR_CODE_INVALID_ZONE = 17;
  
  // Locking service errors
  ERROR_CODE_DOOR_ALREADY_LOCKED = 18;
  ERROR_CODE_DOOR_ALREADY_UNLOCKED = 19;
  ERROR_CODE_DOOR_OPEN = 20;
}
