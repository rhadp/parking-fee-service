# Buf code generation configuration
# https://buf.build/docs/configuration/v1/buf-gen-yaml
#
# This file configures buf generate for multi-language code generation.
# Use with: buf generate (from the proto/ directory)
#
# Requirements: 2.7, 4.9
#
# Output directories:
# - Rust:   rhivos/shared/src/proto/     (handled separately via tonic-build)
# - Kotlin: android/parking-app/app/src/main/java/
# - Dart:   android/companion_app/lib/generated/
# - Go:     backend/gen/

version: v1

# Managed mode for automatic package/import management
managed:
  enabled: true
  
  # Go package configuration
  go_package_prefix:
    default: github.com/sdv-parking-demo/backend/gen
    except:
      - buf.build/googleapis/googleapis
  
  # Java/Kotlin package configuration
  java_multiple_files: true
  java_package_prefix: com.sdv

# Code generation plugins
plugins:
  # ============================================================================
  # Go Generation (backend/)
  # ============================================================================
  
  # Go protobuf messages
  - plugin: buf.build/protocolbuffers/go
    out: ../backend/gen
    opt:
      - paths=source_relative
  
  # Go gRPC services
  - plugin: buf.build/grpc/go
    out: ../backend/gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # ============================================================================
  # Kotlin/Java Generation (android/parking-app/)
  # ============================================================================
  
  # Java protobuf messages
  - plugin: buf.build/protocolbuffers/java
    out: ../android/parking-app/app/src/main/java
  
  # Kotlin protobuf messages
  - plugin: buf.build/protocolbuffers/kotlin
    out: ../android/parking-app/app/src/main/java
  
  # Java gRPC services
  - plugin: buf.build/grpc/java
    out: ../android/parking-app/app/src/main/java

  # ============================================================================
  # Dart Generation (android/companion_app/lib/generated/)
  # ============================================================================
  
  # Dart protobuf messages and gRPC services
  - plugin: buf.build/community/google-dart
    out: ../android/companion_app/lib/generated

  # ============================================================================
  # Rust Generation
  # ============================================================================
  # Note: Rust bindings are generated separately using tonic-build/prost-build
  # because buf does not have native Rust support. The generate-proto.sh script
  # handles Rust generation via cargo build with a custom build.rs file.
  # Output: rhivos/shared/src/proto/

  # ============================================================================
  # Documentation Generation (optional)
  # ============================================================================
  
  # Generate markdown documentation
  # - plugin: buf.build/community/pseudomuto-doc
  #   out: ../docs/proto
  #   opt:
  #     - markdown,docs.md
