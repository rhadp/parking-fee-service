syntax = "proto3";

package gateway;

option go_package = "parking-fee-service/gen/go/gateway";

message VehicleCommand {
  string command_id = 1;
  string action = 2;      // "lock" or "unlock"
  repeated string doors = 3;
  string source = 4;
  string vin = 5;
  int64 timestamp = 6;
}

message CommandResponse {
  string command_id = 1;
  string status = 2;      // "success" or "failed"
  string reason = 3;
  int64 timestamp = 4;
}

// GatewayService relays commands between the cloud and the vehicle.
service GatewayService {
  // SendCommand sends a command to the vehicle and returns the result.
  rpc SendCommand(VehicleCommand) returns (CommandResponse);
}
