syntax = "proto3";
package gateway.v1;

option go_package = "github.com/rhadp/parking-fee-service/gen/gateway/v1;gateway_v1";

message VehicleCommand {
    string          command_id = 1;
    string          action     = 2; // "lock" or "unlock"
    repeated string doors      = 3;
    string          source     = 4;
    string          vin        = 5;
    int64           timestamp  = 6;
}

message CommandResponse {
    string command_id = 1;
    string status     = 2; // "success" or "failed"
    string reason     = 3;
    int64  timestamp  = 4;
}

service CloudGateway {
    rpc RelayCommand(VehicleCommand) returns (CommandResponse);
}
