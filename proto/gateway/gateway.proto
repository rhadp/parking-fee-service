syntax = "proto3";

package gateway.v1;

option go_package = "github.com/rhadp/parking-fee-service/gen/gateway";

// VehicleCommand represents a command sent to a vehicle (e.g., lock/unlock).
message VehicleCommand {
  string command_id = 1;
  string action = 2;      // "lock" or "unlock"
  repeated string doors = 3;
  string source = 4;
  string vin = 5;
  int64 timestamp = 6;
}

// CommandResponse is the result of executing a vehicle command.
message CommandResponse {
  string command_id = 1;
  string status = 2;      // "success" or "failed"
  string reason = 3;
  int64 timestamp = 4;
}

// CloudGateway relays commands between the cloud backend and vehicles.
service CloudGateway {
  // RelayCommand sends a command to a vehicle and returns the result.
  rpc RelayCommand(VehicleCommand) returns (CommandResponse);
}
