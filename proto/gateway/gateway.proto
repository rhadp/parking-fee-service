syntax = "proto3";

package gateway;

option go_package = "github.com/sdv-demo/parking-fee-service/gen/gateway";

// VehicleCommand represents a lock/unlock command relayed from the cloud gateway.
message VehicleCommand {
  string command_id = 1;
  string action = 2;         // "lock" or "unlock"
  repeated string doors = 3;
  string source = 4;
  string vin = 5;
  int64 timestamp = 6;
}

// CommandResponse reports the result of executing a vehicle command.
message CommandResponse {
  string command_id = 1;
  string status = 2;   // "success" or "failed"
  string reason = 3;
  int64 timestamp = 4;
}
