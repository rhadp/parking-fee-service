syntax = "proto3";

package gateway;

option go_package = "github.com/sdv-demo/proto/gateway";

// VehicleCommand represents a command relayed from the companion app to the vehicle.
message VehicleCommand {
  string command_id = 1;
  // action is "lock" or "unlock".
  string action = 2;
  repeated string doors = 3;
  string source = 4;
  string vin = 5;
  int64 timestamp = 6;
}

// CommandResponse reports the result of executing a vehicle command.
message CommandResponse {
  string command_id = 1;
  // status is "success" or "failed".
  string status = 2;
  string reason = 3;
  int64 timestamp = 4;
}

// SendCommandRequest wraps a VehicleCommand for relay.
message SendCommandRequest {
  VehicleCommand command = 1;
}

// SubscribeCommandsRequest subscribes to incoming commands for a vehicle.
message SubscribeCommandsRequest {
  string vin = 1;
}

// CloudGatewayService relays commands between the cloud and RHIVOS vehicles.
service CloudGatewayService {
  // SendCommand relays a command from the cloud to the vehicle.
  rpc SendCommand(SendCommandRequest) returns (CommandResponse);

  // SubscribeCommands streams incoming commands for a vehicle.
  rpc SubscribeCommands(SubscribeCommandsRequest) returns (stream VehicleCommand);
}
