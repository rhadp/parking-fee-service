syntax = "proto3";

package adapter;

option go_package = "github.com/sdv-demo/proto/adapter";

// StartSessionRequest initiates a new parking session for a vehicle.
message StartSessionRequest {
  string vehicle_id = 1;
  string zone_id = 2;
}

// StartSessionResponse contains the newly created session details.
message StartSessionResponse {
  string session_id = 1;
  bool active = 2;
  int64 start_time = 3;
  string zone_id = 4;
}

// StopSessionRequest ends an active parking session.
message StopSessionRequest {
  string session_id = 1;
}

// SessionStatus describes the current state of a parking session.
message SessionStatus {
  string session_id = 1;
  bool active = 2;
  int64 start_time = 3;
  string zone_id = 4;
}

// GetStatusRequest retrieves the status of a parking session.
message GetStatusRequest {
  string session_id = 1;
}

// GetRateRequest retrieves the parking rate for a given zone.
message GetRateRequest {
  string zone_id = 1;
  string operator_id = 2;
}

// ParkingRate describes the fee structure for a parking zone.
message ParkingRate {
  string operator_id = 1;
  // rate_type is "per_hour" or "flat_fee".
  string rate_type = 2;
  double amount = 3;
  string currency = 4;
}

// AdapterService is the gRPC interface exposed by parking operator adapters.
service AdapterService {
  // StartSession begins a new parking session.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // StopSession ends an active parking session.
  rpc StopSession(StopSessionRequest) returns (SessionStatus);

  // GetStatus returns the current status of a session.
  rpc GetStatus(GetStatusRequest) returns (SessionStatus);

  // GetRate returns the current parking rate for a zone.
  rpc GetRate(GetRateRequest) returns (ParkingRate);
}
