syntax = "proto3";
package parking_adaptor.v1;

option go_package = "github.com/rhadp/parking-fee-service/gen/parking_adaptor/v1;parking_adaptor_v1";

message StartSessionRequest {
    string vehicle_id = 1;
    string zone_id    = 2;
}

message StartSessionResponse {
    string session_id = 1;
    string status     = 2;
    ParkingRate rate   = 3;
}

message StopSessionRequest {
    string session_id = 1;
}

message StopSessionResponse {
    string session_id       = 1;
    string status           = 2;
    uint64 duration_seconds = 3;
    double total_amount     = 4;
    string currency         = 5;
}

message GetStatusRequest {}

message SessionStatus {
    string session_id = 1;
    bool   active     = 2;
    int64  start_time = 3;
    string zone_id    = 4;
}

message GetRateRequest {}

message ParkingRate {
    string operator_id = 1;
    string rate_type   = 2; // "per_hour" or "flat_fee"
    double amount      = 3;
    string currency    = 4;
}

service ParkingAdaptor {
    rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
    rpc StopSession (StopSessionRequest)  returns (StopSessionResponse);
    rpc GetStatus   (GetStatusRequest)    returns (SessionStatus);
    rpc GetRate     (GetRateRequest)      returns (ParkingRate);
}
