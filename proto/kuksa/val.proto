syntax = "proto3";

package kuksa.val.v2;

option go_package = "parking-fee-service/tests/databroker/kuksa";

import "google/protobuf/timestamp.proto";

// VSS Data type of a signal.
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_STRING = 1;
  DATA_TYPE_BOOLEAN = 2;
  DATA_TYPE_INT8 = 3;
  DATA_TYPE_INT16 = 4;
  DATA_TYPE_INT32 = 5;
  DATA_TYPE_INT64 = 6;
  DATA_TYPE_UINT8 = 7;
  DATA_TYPE_UINT16 = 8;
  DATA_TYPE_UINT32 = 9;
  DATA_TYPE_UINT64 = 10;
  DATA_TYPE_FLOAT = 11;
  DATA_TYPE_DOUBLE = 12;
  DATA_TYPE_TIMESTAMP = 13;
  DATA_TYPE_STRING_ARRAY = 20;
  DATA_TYPE_BOOLEAN_ARRAY = 21;
  DATA_TYPE_INT8_ARRAY = 22;
  DATA_TYPE_INT16_ARRAY = 23;
  DATA_TYPE_INT32_ARRAY = 24;
  DATA_TYPE_INT64_ARRAY = 25;
  DATA_TYPE_UINT8_ARRAY = 26;
  DATA_TYPE_UINT16_ARRAY = 27;
  DATA_TYPE_UINT32_ARRAY = 28;
  DATA_TYPE_UINT64_ARRAY = 29;
  DATA_TYPE_FLOAT_ARRAY = 30;
  DATA_TYPE_DOUBLE_ARRAY = 31;
  DATA_TYPE_TIMESTAMP_ARRAY = 32;
}

// Entry type of a signal.
enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_ATTRIBUTE = 1;
  ENTRY_TYPE_SENSOR = 2;
  ENTRY_TYPE_ACTUATOR = 3;
}

// Value represents a typed signal value.
message Value {
  oneof typed_value {
    string string = 11;
    bool bool = 12;
    sint32 int32 = 13;
    sint64 int64 = 14;
    uint32 uint32 = 15;
    uint64 uint64 = 16;
    float float = 17;
    double double = 18;
    StringArray string_array = 21;
    BoolArray bool_array = 22;
    Int32Array int32_array = 23;
    Int64Array int64_array = 24;
    Uint32Array uint32_array = 25;
    Uint64Array uint64_array = 26;
    FloatArray float_array = 27;
    DoubleArray double_array = 28;
  }
}

message StringArray { repeated string values = 1; }
message BoolArray { repeated bool values = 1; }
message Int32Array { repeated sint32 values = 1; }
message Int64Array { repeated sint64 values = 1; }
message Uint32Array { repeated uint32 values = 1; }
message Uint64Array { repeated uint64 values = 1; }
message FloatArray { repeated float values = 1; }
message DoubleArray { repeated double values = 1; }

// Datapoint represents a timestamped value.
message Datapoint {
  google.protobuf.Timestamp timestamp = 1;
  Value value = 2;
}

// SignalID identifies a signal by numeric ID or string path.
message SignalID {
  oneof signal {
    int32 id = 1;
    string path = 2;
  }
}

// Metadata describes a signal's schema.
message Metadata {
  int32 id = 10;
  DataType data_type = 11;
  EntryType entry_type = 12;
  string description = 13;
  string comment = 14;
  string deprecation = 15;
  string unit = 16;
  Value allowed_values = 17;
  Value min = 18;
  Value max = 19;
}

// GetValueRequest reads a single signal value.
message GetValueRequest {
  SignalID signal_id = 1;
}

// GetValueResponse returns a single signal's data point.
message GetValueResponse {
  Datapoint data_point = 1;
}

// GetValuesRequest reads multiple signal values.
message GetValuesRequest {
  repeated SignalID signal_ids = 1;
}

// GetValuesResponse returns data points for multiple signals.
message GetValuesResponse {
  repeated Datapoint data_points = 1;
}

// PublishValueRequest writes a value to a signal.
message PublishValueRequest {
  SignalID signal_id = 1;
  Datapoint data_point = 2;
}

// PublishValueResponse is empty on success.
message PublishValueResponse {}

// ListMetadataRequest lists metadata for signals under a root branch.
message ListMetadataRequest {
  string root = 1;
  string filter = 2;
}

// ListMetadataResponse returns metadata for matching signals.
message ListMetadataResponse {
  repeated Metadata metadata = 1;
}

// SubscribeRequest subscribes to signal changes by path.
message SubscribeRequest {
  repeated string signal_paths = 1;
  uint32 buffer_size = 2;
}

// SubscribeResponse streams signal updates as a map of path to Datapoint.
message SubscribeResponse {
  map<string, Datapoint> entries = 1;
}

// GetServerInfoRequest is empty.
message GetServerInfoRequest {}

// GetServerInfoResponse returns server information.
message GetServerInfoResponse {
  string name = 1;
  string version = 2;
}

// VAL is the Kuksa Databroker Vehicle Abstraction Layer service.
service VAL {
  rpc GetValue(GetValueRequest) returns (GetValueResponse);
  rpc GetValues(GetValuesRequest) returns (GetValuesResponse);
  rpc PublishValue(PublishValueRequest) returns (PublishValueResponse);
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
  rpc ListMetadata(ListMetadataRequest) returns (ListMetadataResponse);
  rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);
}
