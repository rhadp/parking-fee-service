syntax = "proto3";
package kuksa.val.v1;

option go_package = "github.com/rhadp/parking-fee-service/gen/kuksa/val/v1;kuksa_val_v1";

// Datapoint represents a single VSS signal value at a point in time.
message Datapoint {
    int64 timestamp = 1;
    oneof value {
        string string_value  = 10;
        bool   bool_value    = 11;
        int32  int32_value   = 12;
        int64  int64_value   = 13;
        uint32 uint32_value  = 14;
        float  float_value   = 15;
        double double_value  = 16;
    }
}

// DataEntry represents a VSS path with its associated datapoints.
message DataEntry {
    string    path              = 1;
    Datapoint value             = 2;
    Datapoint actuator_target   = 3;
    Metadata  metadata          = 10;
}

// EntryRequest specifies which fields to retrieve for a VSS path.
message EntryRequest {
    string         path = 1;
    View           view = 2;
    repeated Field fields = 3;
}

// EntryUpdate specifies which fields to update for a VSS path.
message EntryUpdate {
    DataEntry      entry  = 1;
    repeated Field fields = 2;
}

// DataType indicates the VSS data type of a signal.
enum DataType {
    DATA_TYPE_UNSPECIFIED       = 0;
    DATA_TYPE_STRING            = 1;
    DATA_TYPE_BOOLEAN           = 2;
    DATA_TYPE_INT8              = 3;
    DATA_TYPE_INT16             = 4;
    DATA_TYPE_INT32             = 5;
    DATA_TYPE_INT64             = 6;
    DATA_TYPE_UINT8             = 7;
    DATA_TYPE_UINT16            = 8;
    DATA_TYPE_UINT32            = 9;
    DATA_TYPE_UINT64            = 10;
    DATA_TYPE_FLOAT             = 11;
    DATA_TYPE_DOUBLE            = 12;
    DATA_TYPE_TIMESTAMP         = 13;
    DATA_TYPE_STRING_ARRAY      = 20;
    DATA_TYPE_BOOLEAN_ARRAY     = 21;
    DATA_TYPE_INT8_ARRAY        = 22;
    DATA_TYPE_INT16_ARRAY       = 23;
    DATA_TYPE_INT32_ARRAY       = 24;
    DATA_TYPE_INT64_ARRAY       = 25;
    DATA_TYPE_UINT8_ARRAY       = 26;
    DATA_TYPE_UINT16_ARRAY      = 27;
    DATA_TYPE_UINT32_ARRAY      = 28;
    DATA_TYPE_UINT64_ARRAY      = 29;
    DATA_TYPE_FLOAT_ARRAY       = 30;
    DATA_TYPE_DOUBLE_ARRAY      = 31;
    DATA_TYPE_TIMESTAMP_ARRAY   = 32;
}

// EntryType indicates whether a signal is an attribute, sensor, or actuator.
enum EntryType {
    ENTRY_TYPE_UNSPECIFIED = 0;
    ENTRY_TYPE_ATTRIBUTE  = 1;
    ENTRY_TYPE_SENSOR     = 2;
    ENTRY_TYPE_ACTUATOR   = 3;
}

// Metadata contains type and descriptive information about a VSS signal.
message Metadata {
    DataType  data_type  = 11;
    EntryType entry_type = 12;
    string    description = 13;
}

// View determines what information is returned for a data entry.
enum View {
    VIEW_UNSPECIFIED    = 0;
    VIEW_CURRENT_VALUE  = 1;
    VIEW_TARGET_VALUE   = 2;
    VIEW_METADATA       = 3;
    VIEW_ALL            = 10;
}

// Field indicates which part of a DataEntry to read or write.
enum Field {
    FIELD_UNSPECIFIED    = 0;
    FIELD_VALUE          = 1;
    FIELD_ACTUATOR_TARGET = 2;
    FIELD_METADATA       = 3;
}

// GetRequest retrieves one or more VSS datapoints.
message GetRequest {
    repeated EntryRequest entries = 1;
}

// GetResponse returns requested VSS datapoints.
message GetResponse {
    repeated DataEntry entries = 1;
}

// SetRequest updates one or more VSS datapoints.
message SetRequest {
    repeated EntryUpdate updates = 1;
}

// SetResponse confirms the update.
message SetResponse {}

// SubscribeEntry defines a subscription to a VSS path.
message SubscribeEntry {
    string         path   = 1;
    View           view   = 2;
    repeated Field fields = 3;
}

// SubscribeRequest subscribes to value changes on VSS paths.
message SubscribeRequest {
    repeated SubscribeEntry entries = 1;
}

// SubscribeResponse delivers updates for subscribed VSS paths.
message SubscribeResponse {
    repeated DataEntry updates = 1;
}

service VAL {
    rpc Get       (GetRequest)       returns (GetResponse);
    rpc Set       (SetRequest)       returns (SetResponse);
    rpc Subscribe (SubscribeRequest) returns (stream SubscribeResponse);
}
