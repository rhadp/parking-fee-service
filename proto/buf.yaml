# Buf configuration for Protocol Buffer linting and generation
# https://buf.build/docs/configuration/v1/buf-yaml
#
# This configuration is used by the buf CLI for:
# - Linting proto files for style and correctness
# - Breaking change detection
# - Code generation configuration
#
# Requirements: 2.7, 4.9

version: v1

# Module name for this proto package
name: buf.build/sdv-parking-demo/proto

# Lint configuration
lint:
  use:
    - DEFAULT
    - COMMENTS
  except:
    # Allow shorter package names for simplicity
    - PACKAGE_VERSION_SUFFIX
    # Allow service names without Service suffix (e.g., DataBroker)
    - SERVICE_SUFFIX
  
  # Enum zero values must be suffixed with _UNSPECIFIED
  enum_zero_value_suffix: _UNSPECIFIED
  
  # RPC request/response types must be unique
  rpc_allow_same_request_response: false
  rpc_allow_google_protobuf_empty_requests: true
  rpc_allow_google_protobuf_empty_responses: true
  
  # Service names should match file names
  service_suffix: ""

# Breaking change detection configuration
breaking:
  use:
    - FILE
  except:
    # Allow adding new fields (backward compatible)
    - FIELD_NO_DELETE
    # Allow adding new enum values
    - ENUM_VALUE_NO_DELETE

# Dependencies (external proto files)
deps:
  # Google well-known types (timestamp, duration, etc.)
  - buf.build/googleapis/googleapis
